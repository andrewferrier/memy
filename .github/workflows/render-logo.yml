---
name: Render Logo

on:
  push:
    branches: ["main"]
    paths: ["logo.svg"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin fonts-freefont-ttf

      - name: Render logo.png from logo.svg
        run: rsvg-convert logo.svg -w 1024 -o logo.png

      - name: Commit and push logo.png
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logo.png
          if ! git diff --cached --quiet; then
            git commit -m "chore: re-render logo.png from logo.svg"
            git push
          fi

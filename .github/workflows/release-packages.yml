name: Release
permissions:
  contents: write

on:
  release:
    types: [created]

jobs:
  build:
    name: Build for ${{ matrix.target }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            filename: linux-x86_64
            debos: amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            filename: linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            filename: linux-aarch64
            debos: arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            filename: linux-aarch64-musl
          - os: macos-latest
            target: aarch64-apple-darwin
            filename: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            filename: macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-deb (non-MUSL Linux only)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm (non-MUSL Linux only)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: cargo install cargo-generate-rpm

      - name: Build binary
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary and release tarball (used by homebrew)
        run: |
          mkdir -p dist

          SRC_PATH=target/${{ matrix.target }}/release/memy
          DEST_NAME="memy-${{ matrix.filename }}"

          cp "$SRC_PATH" "dist/$DEST_NAME"
          chmod +x "dist/$DEST_NAME"

          mkdir -p dist_pkg/man

          cp "$SRC_PATH" dist_pkg/memy
          chmod +x dist_pkg/memy
          cp target/man/*.1 dist_pkg/man/
          cp target/man/*.5 dist_pkg/man/
          cp README.md dist_pkg/
          tar --owner=0 --group=0 czf "dist/${DEST_NAME}.tar.gz" -C dist_pkg .

      - name: Build .deb package (non-MUSL Linux only)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: |
          cargo deb --no-strip --no-build --target ${{ matrix.target }}
          cp -v "$(ls target/debian/*.deb)" dist/memy_latest_${{ matrix.debos }}.deb

      - name: Build .rpm package (non-MUSL Linux only)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: |
          cp -v target/${{ matrix.target }}/release/memy target/release/memy
          cargo generate-rpm --arch ${{ matrix.target }}
          cp -v "$(ls target/generate-rpm/*.rpm)" dist/memy_latest_${{ matrix.debos }}.rpm

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from release tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "memy-macos-aarch64.tar.gz" \
            --pattern "memy-macos-x86_64.tar.gz" \
            --pattern "memy-linux-aarch64.tar.gz" \
            --pattern "memy-linux-x86_64.tar.gz" \
            --dir /tmp/memy-release

      - name: Compute sha256sums
        run: |
          {
            echo "SHA256_MACOS_AARCH64=$(sha256sum /tmp/memy-release/memy-macos-aarch64.tar.gz | cut -d' ' -f1)";
            echo "SHA256_MACOS_X86_64=$(sha256sum /tmp/memy-release/memy-macos-x86_64.tar.gz | cut -d' ' -f1)";
            echo "SHA256_LINUX_AARCH64=$(sha256sum /tmp/memy-release/memy-linux-aarch64.tar.gz | cut -d' ' -f1)";
            echo "SHA256_LINUX_X86_64=$(sha256sum /tmp/memy-release/memy-linux-x86_64.tar.gz | cut -d' ' -f1)"
          } >> "$GITHUB_ENV"

      - name: Update Homebrew formula
        run: |
          python3 << 'EOF'
          import os
          import re

          version = os.environ['VERSION']
          tag = os.environ['TAG']
          platforms = [
              ('memy-macos-aarch64.tar.gz', os.environ['SHA256_MACOS_AARCH64']),
              ('memy-macos-x86_64.tar.gz', os.environ['SHA256_MACOS_X86_64']),
              ('memy-linux-aarch64.tar.gz', os.environ['SHA256_LINUX_AARCH64']),
              ('memy-linux-x86_64.tar.gz', os.environ['SHA256_LINUX_X86_64']),
          ]

          with open('Formula/memy.rb') as f:
              content = f.read()

          content = re.sub(r'(\s*version ")[^"]*(")', r'\g<1>' + version + r'\2', content)

          for filename, sha256 in platforms:
              content = re.sub(
                  r'(download/)[^/]+(/' + re.escape(filename) + r'")',
                  r'\g<1>' + tag + r'\2',
                  content,
              )
              pattern = re.escape(filename) + r'"\n(\s+sha256 ")[^"]*(")'
              replacement = filename + r'"\n\g<1>' + sha256 + r'\2'
              content = re.sub(pattern, replacement, content)

          with open('Formula/memy.rb', 'w') as f:
              f.write(content)
          EOF

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/memy.rb
          git commit -m "chore: update homebrew formula for ${TAG}"
          git push origin main

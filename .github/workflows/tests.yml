name: Tests
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required to make git describe work

      - uses: actions-rust-lang/audit@v1
        if: runner.os == 'Linux'

      - name: Install neovim (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -Lo /tmp/nvim-linux-x86_64.tar.gz https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          tar -C /tmp -xzf /tmp/nvim-linux-x86_64.tar.gz
          sudo mv /tmp/nvim-linux-x86_64 /opt/nvim
          sudo ln -s /opt/nvim/bin/nvim /usr/local/bin/nvim

      - name: Install neovim (macOS)
        if: runner.os == 'macOS'
        run: brew install neovim

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
